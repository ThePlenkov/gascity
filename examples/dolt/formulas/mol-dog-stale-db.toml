description = """
Detect and clean stale Dolt databases and orphan Dolt processes.

This formula shells out to `gc dolt-cleanup --json`, parses the
`gc.dolt.cleanup.v1` envelope, and emits one summary line per stage
to `gc events` so operators skimming a long scrollback can spot
trends. The full JSON report is appended to the work bead so a
follow-up reader can `bd show <id>` to see details.

## Dog Contract

This is infrastructure work. You:
1. Scan via `gc dolt-cleanup --json` (dry-run).
2. Decide: under threshold → apply; at/over threshold → escalate.
3. Apply with `gc dolt-cleanup --json --force` when safe.
4. Report findings, nudge deacon if past warn threshold, exit.
5. Return to kennel.

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| max_orphans_for_sql | config | Max orphans before escalating instead of forcing (default 20) |
| warn_threshold | config | Orphan count that triggers a warning to deacon (default 5) |

## Safety

`gc dolt-cleanup` resolves the Dolt port via the AD-04 chain
(--port flag > city dolt.port > <rigRoot>/.beads/dolt-server.port >
legacy 3307). It cross-references registered rigs (HQ-first) and
will not drop any database whose name matches a registered rig DB,
nor any Dolt internals (`information_schema`, `mysql`,
`dolt_cluster`, `__gc_probe`). Orphan-process kills are restricted
to processes whose `--config` path lives under the test-config
allowlist (`/tmp/Test*`, `~/.gotmp/Test*`).

Read each step's description before acting — config values
override defaults."""
formula = "mol-dog-stale-db"
version = 2

[vars]
[vars.max_orphans_for_sql]
description = "Maximum orphan count below which the formula auto-applies; at or above, it escalates instead"
default = "20"

[vars.warn_threshold]
description = "Orphan count that triggers a warning nudge to deacon"
default = "5"

[[steps]]
id = "scan"
title = "Scan for stale databases and orphan processes (dry-run)"
description = """
Run `gc dolt-cleanup --json` (no `--force`) to enumerate stale
databases, dropped-database directories, and orphan dolt sql-server
processes without touching anything.

**1. Run the dry-run scan, capturing JSON to a file:**
```bash
mkdir -p /tmp/dolt-cleanup
SCAN_FILE=/tmp/dolt-cleanup/scan-$$.json
gc dolt-cleanup --json > "$SCAN_FILE"
```

**2. Parse the report (schema `gc.dolt.cleanup.v1`).** Read the
following fields with `jq`:
- `.dropped.count` — stale databases the apply step would drop.
- `.dropped.bytes_freed` — bytes freed from drops (zero in dry-run).
- `.purge.bytes_reclaimed` — bytes the purge step would reclaim.
- `.reaped.targets | length` — orphan processes the reap step
  would kill (in dry-run, `.reaped.count` mirrors this length).
- `.summary.bytes_freed_disk`, `.summary.bytes_freed_rss`,
  `.summary.errors_total` — totals.

**3. Compute the orphan total used for thresholding.** The dog
treats stale databases AND orphan processes as a single "orphan
count":
```bash
ORPHAN_DBS=$(jq -r '.dropped.count' "$SCAN_FILE")
ORPHAN_PROCS=$(jq -r '.reaped.targets | length' "$SCAN_FILE")
ORPHAN_TOTAL=$((ORPHAN_DBS + ORPHAN_PROCS))
DISK_BYTES=$(jq -r '.purge.bytes_reclaimed' "$SCAN_FILE")
RSS_BYTES=$(jq -r '.summary.bytes_freed_rss' "$SCAN_FILE")
```

**4. Emit the scan summary line** (Wireframe 5):
```bash
gc event emit mol-dog-stale-db.scan \\
  --message "$ORPHAN_DBS orphans (${DISK_BYTES} bytes), $ORPHAN_PROCS procs (${RSS_BYTES} bytes)" \\
  --payload "$(jq -c '{dropped: .dropped.count, purge_bytes: .purge.bytes_reclaimed, procs: (.reaped.targets | length), rss_bytes: .summary.bytes_freed_rss}' "$SCAN_FILE")"
```

**5. Attach the dry-run JSON to the work bead** so operators can
read details from `bd show <id>`:
```bash
bd update <work-bead> --append-notes "$(printf '## scan (dry-run) %s\\n\\n```json\\n%s\\n```' "$(date -Is)" "$(cat "$SCAN_FILE")")"
```

**Exit criteria:** scan complete; `$ORPHAN_TOTAL`, `$DISK_BYTES`,
`$RSS_BYTES` set; JSON attached to the bead."""

[[steps]]
id = "decide"
title = "Decide: apply, escalate, or skip"
needs = ["scan"]
description = """
Compare the scan result to the configured thresholds and pick a
branch.

**1. If `$ORPHAN_TOTAL == 0`:**
Nothing to do. Skip ahead to the `report` step with `APPLIED=0` and
`ESCALATED=0`.

**2. If `$ORPHAN_TOTAL >= {{max_orphans_for_sql}}`:**
The system is unhealthy enough that auto-cleanup is risky (mass
drops can stall the server). Set `ESCALATED=1`, do NOT force, and:

- Mail the mayor with the dry-run report attached:
  ```bash
  gc mail send mayor \\
    "ESCALATION: $ORPHAN_TOTAL Dolt orphans exceed max_orphans_for_sql={{max_orphans_for_sql}}" \\
    "Dry-run report attached to work bead. Operator review required before forcing cleanup."
  ```
- Emit the WARN escalation line (Wireframe 5):
  ```bash
  gc event emit mol-dog-stale-db.escalate \\
    --message "$ORPHAN_TOTAL orphans > max_orphans_for_sql={{max_orphans_for_sql}} → mail sent to mayor"
  ```
- Set `APPLIED=0` and skip the `apply` step.

**3. Otherwise (`0 < $ORPHAN_TOTAL < {{max_orphans_for_sql}}`):**
Set `ESCALATED=0` and `APPLY_OK=1`. Continue to `apply`.

**Exit criteria:** `$APPLY_OK`, `$ESCALATED` set; mayor mailed if
escalating."""

[[steps]]
id = "apply"
title = "Apply cleanup with --force"
needs = ["decide"]
description = """
If `decide` selected the apply branch (`$APPLY_OK == 1`), run
`gc dolt-cleanup --json --force` to drop stale DBs, purge dropped
database directories, and reap orphan dolt sql-server processes.

**1. If `$APPLY_OK != 1`, skip this step.**

**2. Run with --force, capturing JSON:**
```bash
APPLY_FILE=/tmp/dolt-cleanup/apply-$$.json
gc dolt-cleanup --json --force > "$APPLY_FILE"
```

**3. Parse stage-by-stage outcomes:**
```bash
DROP_OK=$(jq -r '.dropped.count' "$APPLY_FILE")
DROP_FAIL=$(jq -r '.dropped.failed | length' "$APPLY_FILE")
PURGE_BYTES=$(jq -r '.purge.bytes_reclaimed' "$APPLY_FILE")
PURGE_DIRS=$(jq -r '.purge.directories | length' "$APPLY_FILE")
REAP_KILLED=$(jq -r '.reaped.count' "$APPLY_FILE")
REAP_TOTAL=$(jq -r '.reaped.targets | length' "$APPLY_FILE")
ERR_TOTAL=$(jq -r '.summary.errors_total' "$APPLY_FILE")
TOTAL_BYTES=$(jq -r '(.summary.bytes_freed_disk + .summary.bytes_freed_rss)' "$APPLY_FILE")
```

**4. Emit one INFO line per stage** (Wireframe 5):
```bash
gc event emit mol-dog-stale-db.drop \\
  --message "${DROP_OK}/${ORPHAN_DBS} ok, ${DROP_FAIL} retry"

gc event emit mol-dog-stale-db.purge \\
  --message "${PURGE_BYTES} bytes freed across ${PURGE_DIRS} dbs"

gc event emit mol-dog-stale-db.reap \\
  --message "${REAP_KILLED}/${REAP_TOTAL} procs killed"
```

**5. Attach the apply JSON to the work bead:**
```bash
bd update <work-bead> --append-notes "$(printf '## apply (--force) %s\\n\\n```json\\n%s\\n```' "$(date -Is)" "$(cat "$APPLY_FILE")")"
```

**6. Set `APPLIED=1`, plus the totals for the report step.**

**Exit criteria:** apply complete; events emitted; JSON attached."""

[[steps]]
id = "report"
title = "Report findings, nudge deacon, return to kennel"
needs = ["apply"]
description = """
Emit the closing summary line and surface threshold-warnings.

**1. Emit the done line** (Wireframe 5). Use the apply totals when
applied; the dry-run totals when escalated; zeros when nothing was
found:
```bash
if [ "${APPLIED:-0}" -eq 1 ]; then
  DONE_BYTES=${TOTAL_BYTES:-0}
  DONE_ERRS=${ERR_TOTAL:-0}
elif [ "${ESCALATED:-0}" -eq 1 ]; then
  DONE_BYTES=$((DISK_BYTES + RSS_BYTES))
  DONE_ERRS=0
else
  DONE_BYTES=0
  DONE_ERRS=0
fi

gc event emit mol-dog-stale-db.done \\
  --message "${DONE_BYTES} bytes freed; ${DONE_ERRS} errors"
```

**2. If `$ORPHAN_TOTAL >= {{warn_threshold}}`,** nudge the deacon
so it can patrol consequences:
```bash
gc nudge deacon "WARN: $ORPHAN_TOTAL Dolt orphan(s) detected (warn_threshold={{warn_threshold}})"
```

**3. Signal completion** to the maintenance pool:
```bash
gc nudge deacon "DOG_DONE: stale-db — orphans: ${ORPHAN_TOTAL}, applied: ${APPLIED:-0}, escalated: ${ESCALATED:-0}"
```

**4. Close the work bead and return:**
```bash
bd close <work-bead> --reason "Stale DB scan complete (orphans=${ORPHAN_TOTAL}, applied=${APPLIED:-0})"
gc runtime drain-ack
exit
```

**Exit criteria:** done event emitted, deacon nudged if past
warn_threshold, bead closed, dog returned to kennel."""
